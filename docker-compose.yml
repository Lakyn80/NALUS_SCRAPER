services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      # LLM provider — override with real values:
      # - LLM_PROVIDER=deepseek
      # - LLM_API_KEY=your_key_here
      # - LLM_MODEL_DEEPSEEK=deepseek-chat
      # - LLM_TIMEOUT=10
      # - LLM_MAX_TOKENS=512
    restart: unless-stopped
