name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Check imports
        run: |
          python -c "import fastapi; print('fastapi OK')"
          python -c "import httpx; print('httpx OK')"
          python -c "import qdrant_client; print('qdrant_client OK')"
          python -c "import pytest_asyncio; print('pytest_asyncio OK')"
          python -c "from app.api.main import app; print('app.api.main OK')"
        env:
          PYTHONPATH: .

      - name: Run unit tests
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/test_live_full_text.py \
            -v --tb=long
        env:
          PYTHONPATH: .
