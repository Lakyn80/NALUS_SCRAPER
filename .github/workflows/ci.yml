name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.5.1+cpu \
            transformers==5.3.0 \
            huggingface-hub==1.7.2 \
            scikit-learn==1.7.2 \
            scipy==1.15.3 \
            tqdm==4.67.3
          pip install \
            requests beautifulsoup4 lxml tenacity python-dotenv \
            fastapi uvicorn[standard] httpx pydantic qdrant-client \
            pytest pytest-asyncio

      - name: Run unit tests
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/test_live_full_text.py \
            -q --tb=short
